name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 2.0.0-beta or 2.0.1 (no leading v)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease (default: auto — true for -alpha/-beta/-rc)"
        required: false
        type: choice
        default: "auto"
        options:
          - "auto"
          - "true"
          - "false"

env:
  FLUTTER_VERSION: "3.44.5"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ./roquiz
        run: flutter pub get

      # --- Enable real release signing later (currently debug-signed) --------
      # 1. Create the upload keystore once, locally:
      #      keytool -genkey -v -keystore upload-keystore.jks -keyalg RSA \
      #        -keysize 2048 -validity 10000 -alias upload
      #      base64 -w0 upload-keystore.jks   # -> ANDROID_KEYSTORE_BASE64 secret
      # 2. Add repo secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      #      ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      # 3. Uncomment the step below. build.gradle.kts already switches to the
      #      release signingConfig automatically once key.properties exists.
      # - name: Decode keystore and write key.properties
      #   working-directory: ./roquiz/android
      #   env:
      #     ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      #     ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      #     ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      #     ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      #   run: |
      #     echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/upload-keystore.jks
      #     cat > key.properties <<EOF
      #     storeFile=upload-keystore.jks
      #     storePassword=$ANDROID_KEYSTORE_PASSWORD
      #     keyAlias=$ANDROID_KEY_ALIAS
      #     keyPassword=$ANDROID_KEY_PASSWORD
      #     EOF
      # -----------------------------------------------------------------------

      - name: Build APKs (split per ABI)
        working-directory: ./roquiz
        run: >-
          flutter build apk --release --split-per-abi
          --build-name=${{ inputs.version }}
          --build-number=${{ github.run_number }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: roquiz/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ./roquiz
        run: flutter pub get

      - name: Build Linux (x64)
        working-directory: ./roquiz
        run: >-
          flutter build linux --release
          --build-name=${{ inputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package tarball
        run: tar -czf roquiz-linux-x64.tar.gz -C roquiz/build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: roquiz-linux-x64.tar.gz
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ./roquiz
        run: flutter pub get

      - name: Build web
        working-directory: ./roquiz
        run: >-
          flutter build web --release --base-href /ROQuiz/
          --build-name=${{ inputs.version }}
          --build-number=${{ github.run_number }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: roquiz/build/web

  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-linux]
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files and checksums
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.apk' -o -name '*.tar.gz' \) -exec cp {} release-files/ \;
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Resolve prerelease flag
        id: prerelease
        run: |
          case "${{ inputs.prerelease }}" in
            true)  echo "value=true"  >> "$GITHUB_OUTPUT" ;;
            false) echo "value=false" >> "$GITHUB_OUTPUT" ;;
            *)
              if [[ "${{ inputs.version }}" =~ -(alpha|beta|rc) ]]; then
                echo "value=true" >> "$GITHUB_OUTPUT"
              else
                echo "value=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: release-files/*

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
