name: roquiz
description: "Applicazione per esercitarsi con i quiz di Ricerca Operativa M."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.0.0+0

environment:
  sdk: ^3.8.1

# Check updates with: `flutter pub outdated`
# Update with: `flutter pub upgrade --major-versions`
dependencies:
  flutter:
    sdk: flutter

  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint rules in analysis_options.yaml
  flutter_lints: ^5.0.0
  test: ^1.25.8

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  assets:
    - assets/licenses.json
    - assets/domande.txt
    - assets/questions.yaml
    - assets/credits.json
